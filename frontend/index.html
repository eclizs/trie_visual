<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>orderan</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <main class="app">

    <!-- Mode switcher -->
    <nav class="mode-switch" role="tablist" aria-label="Choose action">
      <button class="mode-btn is-active" data-mode="search" role="tab" aria-selected="true">Cari</button>
      <button class="mode-btn" data-mode="add" role="tab" aria-selected="false">Tambahkan Kata</button>
      <button class="mode-btn" data-mode="delete" role="tab" aria-selected="false">Hapus Kata</button>
    </nav>

    <!-- SEARCH PANEL -->
    <section class="panel is-active" id="panel-search" role="tabpanel">
      <label class="field-label" for="search-input">Cari Kata</label>
      <div class="search-box">
        <input
          id="search-input"
          class="text-input"
          type="text"
          placeholder="type to search…"
          autocomplete="off"
          maxlength="100"
          role="combobox"
          aria-expanded="false"
          aria-autocomplete="list"
          aria-controls="results-list"
        >
        <ul class="entry-list" id="results-list" role="listbox" aria-live="polite"></ul>
      </div>
  
      <div class="saved-panel">
        <label class="field-label">Saved words</label>
        <pre class="saved-list" id="saved-list"></pre>
        <button id="clearBtn" type="button">Clear</button>
        <button id="copyBtn" type="button">Copy to clipboard</button>
        <div>
          <button id="saveBtn" type="button">Save as file</button>
          <p class="status-msg" id="save-status" role="status"></p>
        </div>
        
        <div class="header-wrapper">
          <button id="headerBtn" type="button">Add Header</button>
          <input
              id="header-input"
              class="text-input"
              type="text"
              autocomplete="off"
              maxlength="20"
          >

        </div>
      </div>
    </section>

    <!-- ADD PANEL -->
    <section class="panel" id="panel-add" role="tabpanel">
      <label class="field-label" for="add-input">Tambah kata</label>
      <input
        id="add-input"
        class="text-input"
        type="text"
        placeholder="Enter word here..."
        autocomplete="off"
        maxlength="100"
      >
      <button class="action-btn" id="add-btn">Tambahkan</button>
      <form method="post" enctype="multipart/form-data">
        <div>
          <input type="file" id="file" name="file" accept=".csv" />
        </div>
        <div>
          <button id="uploadBtn" type="button">Submit</button>
          <pre class="status-msg" id="upload-status" role="status"></pre>
        </div>
      </form>
      <p class="status-msg" id="add-status" role="status"></p>
    </section>

    <!-- DELETE PANEL -->
    <section class="panel" id="panel-delete" role="tabpanel">
      <label class="field-label" for="delete-input">Hapus kata</label>
      <input
        id="delete-input"
        class="text-input"
        type="text"
        placeholder="Enter word here..."
        autocomplete="off"
        maxlength="100"
      >
      <button class="action-btn danger" id="delete-btn">Hapus</button>
      <p class="status-msg" id="delete-status" role="status"></p>
    </section>

  </main>

  <script src="/static/app.js"></script>
</body>
</html>
